<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Antenna{% endblock %}</title>
  <style>
    body { margin: 0; background: #fafafa; color: #1f2328; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .wrap { max-width: 680px; margin: 0 auto; padding: 32px 20px 64px; background: #ffffff; }
    .feed-header { font-size: 13px; letter-spacing: 0.02em; text-transform: uppercase; color: #6b7280; margin: 0 0 16px; padding-bottom: 12px; border-bottom: 1px solid #e5e7eb; }
    .feed-header strong { color: #111827; letter-spacing: 0; text-transform: none; font-size: 15px; }
    h1.post-title { font-size: 26px; line-height: 1.22; margin: 0 0 8px; color: #0f172a; letter-spacing: -0.01em; }
    h1.post-title a { color: inherit; text-decoration: none; }
    .byline { color: #6b7280; font-size: 13px; margin: 0 0 24px; }
    .byline a { color: #2563eb; text-decoration: none; }
    .content { font-size: 16px; line-height: 1.65; color: #1f2328; }
    .content p { margin: 0 0 16px; }
    .content img, .content video { max-width: 100%; height: auto; border-radius: 6px; display: block; margin: 12px 0; }
    .content a { color: #2563eb; }
    .content pre { background: #f6f8fa; padding: 12px 14px; overflow-x: auto; border-radius: 6px; font-size: 13px; line-height: 1.5; }
    .content code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: 0.92em; }
    .content pre code { background: transparent; padding: 0; }
    .content blockquote { margin: 0 0 16px; padding: 4px 0 4px 16px; border-left: 3px solid #d1d5db; color: #4b5563; }
    .footer { margin-top: 48px; padding-top: 16px; border-top: 1px solid #e5e7eb; font-size: 12px; color: #6b7280; }
    .footer a { color: #6b7280; }
    .digest-list { list-style: none; padding: 0; margin: 0; }
    .digest-item { padding: 16px 0; border-bottom: 1px solid #eef2f7; }
    .digest-item:last-child { border-bottom: none; }
    .digest-item h2 { font-size: 18px; line-height: 1.3; margin: 0 0 4px; }
    .digest-item h2 a { color: #0f172a; text-decoration: none; }
    .digest-item .meta { font-size: 12px; color: #6b7280; margin: 0 0 8px; }
    .digest-item .excerpt { font-size: 14px; color: #374151; line-height: 1.55; margin: 0; }
    .group-heading { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: #9ca3af; margin: 24px 0 4px; }
    .alert-banner { background: #fef3c7; color: #78350f; padding: 10px 14px; border-radius: 6px; font-size: 14px; margin-bottom: 24px; }
    @media (prefers-color-scheme: dark) {
      body { background: #0b1220; color: #e2e8f0; }
      .wrap { background: #0f172a; }
      .feed-header, .byline, .footer { color: #94a3b8; border-color: #1f2937; }
      .feed-header strong, h1.post-title, .digest-item h2 a { color: #f8fafc; }
      .content { color: #e2e8f0; }
      .content pre, .content code { background: #1e293b; color: #e2e8f0; }
      .content blockquote { border-color: #334155; color: #cbd5e1; }
      .digest-item { border-color: #1f2937; }
      .group-heading { color: #64748b; }
      .alert-banner { background: #422006; color: #fde68a; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    {% block body %}{% endblock %}
  </div>
</body>
</html>
